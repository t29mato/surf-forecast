name: Surfline Condition Scraper

on:
  schedule:
    # 4 times per day (JST) to maximise label coverage:
    #   06:00 JST = 21:00 UTC
    #   09:00 JST = 00:00 UTC
    #   12:00 JST = 03:00 UTC
    #   18:00 JST = 09:00 UTC
    - cron: "0 21 * * *"
    - cron: "0  0 * * *"
    - cron: "0  3 * * *"
    - cron: "0  9 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore SQLite database
        uses: actions/cache@v4
        with:
          path: data/surf_forecast.db
          key: surf-db-${{ github.run_number }}
          restore-keys: |
            surf-db-

      - name: Run Surfline scraper
        run: python scripts/scrape_surfline.py

      - name: Save SQLite database
        uses: actions/cache/save@v4
        with:
          path: data/surf_forecast.db
          key: surf-db-${{ github.run_number }}
